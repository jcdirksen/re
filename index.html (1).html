<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #080808;
    --near-black: #0f0f0f;
    --warm: #c8924a;
    --warm-dim: #8a5f2a;
    --warm-glow: rgba(200, 146, 74, 0.12);
    --text: #c9c0b4;
    --text-dim: #6b6258;
    --text-faint: #3a3530;
  }

  html, body {
    height: 100%;
    background: var(--black);
    color: var(--text);
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
    opacity: 0.4;
    pointer-events: none;
    z-index: 1000;
  }

  .screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 32px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s ease;
  }

  .screen.active {
    opacity: 1;
    pointer-events: all;
  }

  /* ── ENTRY SCREEN ── */
  #screen-entry {
    background: var(--black);
  }

  .door-container {
    position: relative;
    width: 80px;
    height: 110px;
    margin-bottom: 52px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .door-container:active .door-svg {
    transform: scale(1.06);
  }

  .door-svg {
    position: relative;
    z-index: 2;
    transition: transform 0.2s ease;
  }

  .door-glow {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 160px;
    height: 200px;
    background: radial-gradient(ellipse at center, rgba(200,146,74,0.18) 0%, transparent 70%);
    animation: breathe 4s ease-in-out infinite;
  }



  @keyframes breathe {
    0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
  }

  .re-wordmark {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 0.35em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 48px;
  }

  .entry-invite {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: 22px;
    color: var(--text);
    text-align: center;
    line-height: 1.7;
    margin-bottom: 0;
    opacity: 0;
    animation: fadeUp 1.2s ease 0.6s forwards;
  }

  .entry-invite strong {
    font-weight: 400;
    font-style: normal;
    color: var(--warm);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .entry-btn {
    background: none;
    border: none;
    border-bottom: 1px solid var(--warm-dim);
    color: var(--warm);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    padding: 8px 0;
    cursor: pointer;
    transition: color 0.3s, border-color 0.3s;
    opacity: 0;
    animation: fadeUp 1.2s ease 1.1s forwards;
  }

  .entry-btn:hover {
    color: #e0a85c;
    border-color: #e0a85c;
  }

  /* ── STATE SELECTION ── */
  #screen-state {
    background: var(--black);
    gap: 0;
  }

  .state-prompt {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 15px;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    margin-bottom: 8px;
    text-align: center;
  }

  .state-question {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: 24px;
    color: var(--text);
    text-align: center;
    margin-bottom: 52px;
    line-height: 1.5;
  }

  .state-options {
    display: flex;
    flex-direction: column;
    gap: 4px;
    width: 100%;
    max-width: 280px;
  }

  .state-btn {
    background: none;
    border: none;
    border-left: 1px solid var(--text-faint);
    padding: 14px 20px;
    text-align: left;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .state-btn:hover {
    border-left-color: var(--warm-dim);
    background: var(--warm-glow);
  }

  .state-name {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--warm);
    transition: color 0.3s;
  }

  .state-desc {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: 15px;
    color: var(--text-dim);
    transition: color 0.3s;
  }

  .state-btn:hover .state-desc {
    color: var(--text);
  }

  .state-notsure {
    margin-top: 28px;
    background: none;
    border: none;
    color: var(--text-faint);
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    font-size: 11px;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: color 0.3s;
    text-transform: uppercase;
  }

  .state-notsure:hover { color: var(--text-dim); }

  /* ── SESSION SCREEN ── */
  #screen-session {
    background: var(--black);
    justify-content: flex-start;
    padding-top: 60px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .session-mode {
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    font-size: 10px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--warm-dim);
    margin-bottom: 40px;
    align-self: flex-start;
  }

  .session-content {
    width: 100%;
    max-width: 320px;
    align-self: flex-start;
  }

  .session-line {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 20px;
    line-height: 1.75;
    color: var(--text);
    margin-bottom: 0;
    opacity: 0;
    transform: translateY(3px);
    transition: opacity 2s ease, transform 2s ease;
    min-height: 1.75em;
  }

  .session-line.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .session-line.dim {
    color: var(--text-dim);
    font-size: 16px;
  }

  .session-line.accent {
    color: var(--warm);
    font-style: italic;
  }

  .session-line.small {
    font-size: 15px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }

  .session-line.closing {
    color: var(--text-dim);
    font-style: italic;
    font-size: 18px;
  }

  .session-pause {
    height: 12px;
  }

  .session-actions {
    margin-top: 80px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 16px;
    opacity: 0;
    transition: opacity 0.8s ease;
    width: 100%;
    max-width: 320px;
    align-self: flex-start;
  }

  .session-actions.visible {
    opacity: 1;
  }

  .btn-return {
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: 16px;
    padding: 6px 0;
    cursor: pointer;
    transition: color 0.3s;
  }

  .btn-return:hover { color: var(--text); }

  .btn-close {
    background: none;
    border: none;
    color: var(--text-faint);
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: 14px;
    cursor: pointer;
    transition: opacity 0.3s;
    padding: 4px 0;
    opacity: 0.6;
  }

  .btn-close:hover { opacity: 1; }

  /* ── COMFORT/CLARITY FORK ── */
  .fork-container {
    display: none;
    flex-direction: column;
    gap: 4px;
    margin-top: 8px;
    opacity: 0;
    transition: opacity 0.6s ease;
    width: 100%;
    max-width: 320px;
    align-self: flex-start;
  }

  .fork-container.visible {
    display: flex;
    opacity: 1;
  }

  .fork-label {
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 12px;
  }

  .fork-btn {
    background: none;
    border: none;
    border-left: 1px solid var(--text-faint);
    padding: 12px 18px;
    text-align: left;
    cursor: pointer;
    transition: all 0.3s;
    color: var(--text-dim);
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: 17px;
  }

  .fork-btn:hover {
    border-left-color: var(--warm-dim);
    color: var(--text);
    background: var(--warm-glow);
  }

  /* ── NOT SURE SCREEN ── */
  #screen-notsure {
    background: var(--black);
  }

  .notsure-q {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 14px;
    color: var(--text-dim);
    margin-bottom: 6px;
    text-align: center;
  }

  .notsure-main {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: 22px;
    color: var(--text);
    text-align: center;
    margin-bottom: 44px;
    line-height: 1.6;
  }

  .notsure-options {
    display: flex;
    flex-direction: column;
    gap: 4px;
    width: 100%;
    max-width: 260px;
  }

  .notsure-btn {
    background: none;
    border: none;
    border-left: 1px solid var(--text-faint);
    padding: 12px 18px;
    text-align: left;
    cursor: pointer;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: 18px;
    color: var(--text-dim);
    transition: all 0.3s;
  }

  .notsure-btn:hover {
    border-left-color: var(--warm-dim);
    color: var(--text);
    background: var(--warm-glow);
  }

  /* Release box */
  .release-container {
    display: none;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    max-width: 320px;
    align-self: flex-start;
    margin-top: 60px;
    opacity: 0;
    transition: opacity 1.4s ease;
  }

  .release-container.visible {
    opacity: 1;
  }

  .release-prompt {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: 17px;
    color: var(--text-dim);
    line-height: 1.6;
  }

  .release-input {
    background: none;
    border: none;
    border-bottom: 1px solid var(--text-faint);
    padding: 8px 0;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 16px;
    color: var(--text);
    outline: none;
    resize: none;
    min-height: 60px;
    width: 100%;
    line-height: 1.7;
    transition: border-color 0.4s;
  }

  .release-input:focus {
    border-bottom-color: var(--warm-dim);
  }

  .release-input::placeholder {
    color: var(--text-faint);
    font-style: italic;
  }

  .release-btn {
    background: none;
    border: none;
    color: var(--text-faint);
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: 15px;
    cursor: pointer;
    padding: 0;
    text-align: left;
    transition: color 0.3s;
    align-self: flex-start;
  }

  .release-btn:hover { color: var(--text-dim); }

  /* dissolve animation */
  @keyframes dissolve {
    0% { opacity: 1; }
    100% { opacity: 0; transform: translateY(-8px); }
  }

  .dissolving {
    animation: dissolve 1.2s ease forwards;
  }
  #screen-session::-webkit-scrollbar { width: 2px; }
  #screen-session::-webkit-scrollbar-track { background: transparent; }
  #screen-session::-webkit-scrollbar-thumb { background: var(--text-faint); }
</style>
</head>
<body>

<!-- ENTRY -->
<div class="screen active" id="screen-entry">
  <div class="door-container" onclick="showScreen('screen-state')">
    <div class="door-glow"></div>
    <svg class="door-svg" width="80" height="110" viewBox="0 0 80 110" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Door frame -->
      <rect x="8" y="4" width="64" height="102" rx="1" fill="#0a0a0a" stroke="#2a2420" stroke-width="1"/>
      <!-- Warm light spill from inside -->
      <defs>
        <radialGradient id="lightSpill" cx="30%" cy="50%" r="60%">
          <stop offset="0%" stop-color="#c8924a" stop-opacity="0.6"/>
          <stop offset="50%" stop-color="#8a5f2a" stop-opacity="0.2"/>
          <stop offset="100%" stop-color="#c8924a" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="doorEdge" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#c8924a" stop-opacity="0.8"/>
          <stop offset="100%" stop-color="#c8924a" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <!-- Light from door gap -->
      <rect x="8" y="4" width="64" height="102" fill="url(#lightSpill)"/>
      <!-- Door panel (ajar) -->
      <rect x="18" y="8" width="54" height="98" rx="1" fill="#111008" stroke="#1a1510" stroke-width="0.5"/>
      <!-- Door edge light line -->
      <line x1="18" y1="8" x2="18" y2="106" stroke="#c8924a" stroke-width="1.5" stroke-opacity="0.7"/>
      <!-- Floor light spill -->
      <ellipse cx="28" cy="106" rx="20" ry="3" fill="#c8924a" fill-opacity="0.15"/>
      <!-- Door handle -->
      <circle cx="30" cy="57" r="2" fill="#c8924a" fill-opacity="0.5"/>
    </svg>
  </div>

  <p class="re-wordmark">RE.</p>

  <p class="entry-invite">A place you can enter<br>when the <strong>noise</strong> gets too much.</p>
</div>

<!-- STATE SELECTION -->
<div class="screen" id="screen-state">
  <p class="state-prompt">Okay… I'm here.</p>
  <p class="state-question">Are you arriving heavy,<br>wired, empty… or numb?</p>

  <div class="state-options">
    <button class="state-btn" onclick="startSession('heavy')">
      <span class="state-name">Heavy</span>
      <span class="state-desc">carrying too much</span>
    </button>
    <button class="state-btn" onclick="startSession('wired')">
      <span class="state-name">Wired</span>
      <span class="state-desc">mind won't slow down</span>
    </button>
    <button class="state-btn" onclick="startSession('empty')">
      <span class="state-name">Empty</span>
      <span class="state-desc">nothing left right now</span>
    </button>
    <button class="state-btn" onclick="startSession('numb')">
      <span class="state-name">Numb</span>
      <span class="state-desc">blank, but not sad</span>
    </button>
  </div>

  <button class="state-notsure" onclick="showScreen('screen-notsure')">Not sure</button>
</div>

<!-- NOT SURE -->
<div class="screen" id="screen-notsure">
  <p class="notsure-q">That's okay.</p>
  <p class="notsure-main">Is it more in your mind…<br>or in your body?</p>
  <div class="notsure-options">
    <button class="notsure-btn" onclick="startSession('wired')">More in my mind</button>
    <button class="notsure-btn" onclick="startSession('heavy')">More in my body</button>
  </div>
</div>

<!-- SESSION -->
<div class="screen" id="screen-session">
  <div class="session-mode" id="session-mode-label"></div>
  <div class="session-content" id="session-content"></div>
  <div class="fork-container" id="fork-container">
    <p class="fork-label">Right now…</p>
    <button class="fork-btn" onclick="showFork('comfort')">I need comfort</button>
    <button class="fork-btn" onclick="showFork('clarity')">I need clarity</button>
  </div>
  <div class="release-container" id="release-container">
    <p class="release-prompt">Anything you want to leave here before you go?</p>
    <textarea class="release-input" id="release-input" placeholder=""></textarea>
    <button class="release-btn" onclick="releaseAndExit()">let it go</button>
  </div>
  <div class="session-actions" id="session-actions">
    <button class="btn-close" onclick="showScreen('screen-entry')" aria-label="Leave quietly">
      <svg width="18" height="24" viewBox="0 0 18 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="16" height="22" rx="0.5" fill="none" stroke="#3a3530" stroke-width="0.75"/>
        <rect x="4" y="2" width="13" height="21" rx="0.5" fill="#0f0e0a" stroke="#2a2420" stroke-width="0.5"/>
        <line x1="4" y1="2" x2="4" y2="23" stroke="#c8924a" stroke-width="1" stroke-opacity="0.5"/>
        <ellipse cx="7" cy="12.5" rx="5" ry="8" fill="url(#doorGlowSmall)" />
        <defs>
          <radialGradient id="doorGlowSmall" cx="20%" cy="50%" r="60%">
            <stop offset="0%" stop-color="#c8924a" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#c8924a" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <circle cx="6.5" cy="12.5" r="1" fill="#c8924a" fill-opacity="0.4"/>
      </svg>
    </button>
  </div>
</div>

<script>
  // Session scripts
  const sessions = {
    heavy: {
      label: 'RE. — Heavy',
      lines: [
        { text: 'Okay…', delay: 0, cls: 'dim' },
        { text: 'I\'m here.', delay: 1400, cls: '' },
        { pause: true, delay: 2400 },
        { text: 'Heavy means you\'ve been carrying.', delay: 3600, cls: '' },
        { text: 'And if you\'re carrying…', delay: 5600, cls: 'dim' },
        { text: 'it doesn\'t mean you\'re failing.', delay: 7400, cls: '' },
        { pause: true, delay: 9000 },
        { text: 'Just breathe for a moment.', delay: 10000, cls: 'dim' },
        { pause: true, delay: 14000 },
        { text: 'You are overloaded…', delay: 15200, cls: 'accent' },
        { text: 'not broken.', delay: 17200, cls: 'accent' },

  let currentSession = null;
  let forkShown = false;
  let allTimers = [];

  function clearTimers() {
    allTimers.forEach(t => clearTimeout(t));
    allTimers = [];
  }

  function showScreen(id) {
    clearTimers();
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if (id === 'screen-session') {
      document.getElementById('screen-session').scrollTop = 0;
    }
    const release = document.getElementById('release-container');
    if (release) {
      release.style.display = 'none';
      release.classList.remove('visible', 'dissolving');
      document.getElementById('release-input').value = '';
    }
    document.getElementById('session-actions').classList.remove('visible');
  }

  function addLine(container, text, cls, delay) {
    const t = setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'session-line' + (cls ? ' ' + cls : '');
      el.textContent = text;
      container.appendChild(el);
      setTimeout(() => el.classList.add('visible'), 200);
      const screen = document.getElementById('screen-session');
      screen.scrollTop = screen.scrollHeight;
    }, delay);
    allTimers.push(t);
  }

  function addPause(container, delay) {
    const t = setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'session-pause';
      container.appendChild(el);
    }, delay);
    allTimers.push(t);
  }

  function startSession(mode) {
    forkShown = false;
    currentSession = mode;
    const s = sessions[mode];

    showScreen('screen-session');

    document.getElementById('session-mode-label').textContent = s.label;
    const content = document.getElementById('session-content');
    content.innerHTML = '';
    document.getElementById('fork-container').classList.remove('visible');
    document.getElementById('fork-container').style.display = 'none';

    let maxDelay = 0;

    s.lines.forEach(line => {
      if (line.pause) {
        addPause(content, line.delay);
      } else if (line.fork) {
        if (mode === 'heavy') {
          const t = setTimeout(() => {
            const fork = document.getElementById('fork-container');
            fork.style.display = 'flex';
            requestAnimationFrame(() => fork.classList.add('visible'));
          }, line.delay);
          allTimers.push(t);
        }
        maxDelay = Math.max(maxDelay, line.delay);
      } else {
        addLine(content, line.text, line.cls, line.delay);
        maxDelay = Math.max(maxDelay, line.delay);
      }
    });

    if (mode !== 'heavy') {
      // Show closing + release box
      const closingDelay = maxDelay + 2000;
      s.closing.forEach((line, i) => {
        addLine(content, line.text, line.cls, closingDelay + line.delay);
      });
      const releaseDelay = closingDelay + 4000;
      const t = setTimeout(() => showRelease(), releaseDelay);
      allTimers.push(t);
    }
  }

  function showRelease() {
    const release = document.getElementById('release-container');
    release.style.display = 'flex';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => release.classList.add('visible'));
    });
    const screen = document.getElementById('screen-session');
    setTimeout(() => { screen.scrollTop = screen.scrollHeight; }, 600);
  }

  function releaseAndExit() {
    const input = document.getElementById('release-input');
    const release = document.getElementById('release-container');
    release.classList.add('dissolving');
    setTimeout(() => {
      release.style.display = 'none';
      release.classList.remove('dissolving', 'visible');
      input.value = '';
      document.getElementById('session-actions').classList.add('visible');
      const screen = document.getElementById('screen-session');
      screen.scrollTop = screen.scrollHeight;
    }, 1200);
  }

  function showFork(type) {
    if (forkShown) return;
    forkShown = true;

    const fork = document.getElementById('fork-container');
    fork.classList.remove('visible');
    setTimeout(() => { fork.style.display = 'none'; }, 600);

    const s = sessions['heavy'];
    const content = document.getElementById('session-content');
    const lines = type === 'comfort' ? s.comfortLines : s.clarityLines;

    let maxDelay = 0;
    lines.forEach(line => {
      if (line.pause) {
        addPause(content, line.delay);
      } else {
        addLine(content, line.text, line.cls, line.delay);
        maxDelay = Math.max(maxDelay, line.delay);
      }
    });

    const closingDelay = maxDelay + 2000;
    s.closing.forEach(line => {
      addLine(content, line.text, line.cls, closingDelay + line.delay);
    });

    const releaseDelay = closingDelay + 4000;
    const t = setTimeout(() => showRelease(), releaseDelay);
    allTimers.push(t);
  }
